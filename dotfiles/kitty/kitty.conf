# kitty — the one terminal for hypr-shell. Themed to the DE palette: graphite
# chrome (Theme.qml) + Gruvbox ANSI colours (colors.lua) for command/code output.
# Auto-attaches a themed tmux session; `kitty -e <cmd>` still runs <cmd> directly.

# ── font ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
disable_ligatures never

# ── window / chrome ─────────────────────────────────────────────────────────
window_padding_width   8
background_opacity      0.95
confirm_os_window_close 0
cursor_shape            beam
cursor_blink_interval   0
scrollback_lines        20000
enable_audio_bell       no
# Hyprland draws the border + does the blur; kitty stays borderless.
hide_window_decorations yes

# ── tab bar (graphite, accent-blue active tab) ───────────────────────────────
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style slanted
active_tab_background   #0a84ff
active_tab_foreground   #ffffff
active_tab_font_style   bold
inactive_tab_background #1d1d1f
inactive_tab_foreground #8e8e93

# ── base colours (graphite chrome) ───────────────────────────────────────────
foreground            #f2f2f7
background            #1c1c1e
selection_foreground  #ffffff
selection_background  #14345f
cursor                #0a84ff
cursor_text_color     #1c1c1e
url_color             #0a84ff

# ── ANSI palette (Gruvbox — colours command output + TUIs to the DE scheme) ──
color0  #282828
color8  #928374
color1  #cc241d
color9  #fb4934
color2  #98971a
color10 #b8bb26
color3  #d79921
color11 #fabd2f
color4  #458588
color12 #83a598
color5  #b16286
color13 #d3869b
color6  #689d6a
color14 #8ec07c
color7  #a89984
color15 #ebdbb2

# ── auto-attach a themed tmux session (preconfigured terminal multiplexer) ───
# `new-session -A -s main` attaches to "main" or creates it — so every kitty
# shares one persistent, themed tmux. Falls back to the login shell if tmux is
# somehow absent (never a broken terminal). `kitty -e <cmd>` (Fresh, ssh, …)
# bypasses this and runs the command directly.
shell sh -c 'command -v tmux >/dev/null 2>&1 && exec tmux new-session -A -s main || exec "$SHELL"'
