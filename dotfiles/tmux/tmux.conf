# tmux — preconfigured + themed for hypr-shell (graphite + accent blue, Gruvbox
# hues). Loaded from ~/.config/tmux/tmux.conf (tmux 3.1+). kitty auto-attaches a
# "main" session into this.

# ── behaviour ─────────────────────────────────────────────────────────────────
set  -g  default-terminal "tmux-256color"
set  -ga terminal-overrides ",xterm-kitty:Tc,*:RGB"   # truecolor
set  -g  mouse on
set  -g  base-index 1
setw -g  pane-base-index 1
set  -g  renumber-windows on
set  -g  history-limit 50000
set  -sg escape-time 10
set  -g  focus-events on
setw -g  mode-keys vi
set  -g  set-clipboard on

# ── keys: keep C-b, add intuitive splits + vim pane nav ──────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── theme (graphite surfaces, accent-blue active, Gruvbox text) ──────────────
set -g status-position top
set -g status-style "bg=#1d1d1f,fg=#8e8e93"
set -g status-left  "#[bg=#0a84ff,fg=#ffffff,bold] #S #[bg=#1d1d1f,fg=#1d1d1f] "
set -g status-left-length 30
set -g status-right "#[fg=#8e8e93] %a %d %b  #[fg=#f2f2f7]%H:%M "
set -g status-right-length 40

setw -g window-status-format         "#[fg=#8e8e93] #I #W "
setw -g window-status-current-format "#[bg=#2c2c2e,fg=#f2f2f7,bold] #I #W "
setw -g window-status-separator ""

set -g pane-border-style        "fg=#38383a"
set -g pane-active-border-style "fg=#0a84ff"
set -g message-style "bg=#2c2c2e,fg=#f2f2f7"
set -g mode-style    "bg=#0a84ff,fg=#ffffff"
