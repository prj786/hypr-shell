# hypridle — idle management. Locks via the Quickshell session lock (qs ipc),
# blanks the screens shortly after, and always locks before the system sleeps.
# (Lid-close behaviour is handled by lid.sh, not here.)

general {
    lock_cmd         = qs ipc call lock lock          # catches `loginctl lock-session`
    before_sleep_cmd = qs ipc call lock lock          # lock before any suspend
    after_sleep_cmd  = hyprctl dispatch 'hl.dsp.dpms("on")'
    ignore_dbus_inhibit = false
}

# 5 min idle → lock
listener {
    timeout    = 300
    on-timeout = qs ipc call lock lock
}

# 15 min idle → suspend, but ONLY on a laptop running on battery (idle-suspend.sh
# no-ops on a desktop or while plugged in). before_sleep_cmd locks first. Desktop
# users — or anyone who doesn't want idle-suspend — can delete this listener.
listener {
    timeout    = 900
    on-timeout = ~/.config/hypr/scripts/idle-suspend.sh
}

# NOTE: no dpms-off listener on purpose. The Lunar Lake `xe` GPU has a known
# DPMS-resume bug that can leave the panel black and unwakeable, so we lock but
# never power the panel fully off. Re-add a `dpms off` listener here if a fix
# lands upstream (the Settings → Displays pane is the place to surface a toggle).
