# Installed to /etc/greetd/config.toml by phase 30. Fully Wayland: greetd runs
# `cage` (a one-shot kiosk Wayland compositor) which hosts ReGreet, the graphical
# greeter. No Xorg. After you pick "Hyprland (DE)" and log in, ReGreet exec's the
# session's wrapper (start-hyprland.sh) — also pure Wayland.
[terminal]
# The VT the greeter owns. vt = "next" picks a free one automatically.
vt = "next"

[default_session]
# cage -s prints its socket info and runs regreet fullscreen; regreet talks to
# greetd over $GREETD_SOCK to authenticate and launch the chosen session.
#
# WLR_NO_HARDWARE_CURSORS=1 disables the wlroots hardware-cursor plane for cage.
# This fixes the inverted / upside-down pointer under virtio-gpu (QEMU/KVM) and
# the flaky `xe` cursor plane on Lunar Lake — both render a broken HW cursor.
# Cost is negligible for a greeter; safe on every GPU.
command = "env WLR_NO_HARDWARE_CURSORS=1 cage -s -- regreet"
user = "greeter"
