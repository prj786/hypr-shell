# Installed to /etc/greetd/regreet.toml by phase 30. ReGreet inherits the same
# look as the desktop: adw-gtk3 dark + Papirus + the Bibata cursor. It scans the
# standard wayland-session dirs (phase 30 installs the entry to both /usr/share
# and /usr/local/share/wayland-sessions) and lists "Hyprland (DE)".

[background]
# Optional login wallpaper. Drop a file here and uncomment; otherwise ReGreet
# uses a solid background. Keep it on a path the `greeter` user can read.
# path = "/usr/share/backgrounds/hyprdots/login.jpg"
# fit = "Cover"

[GTK]
application_prefer_dark_theme = true
cursor_theme_name = "Bibata-Modern-Classic"
font_name = "Inter 11"
icon_theme_name = "Papirus-Dark"
theme_name = "adw-gtk3-dark"

[appearance]
greeting_msg = "Welcome back"

[commands]
reboot = ["systemctl", "reboot"]
poweroff = ["systemctl", "poweroff"]
