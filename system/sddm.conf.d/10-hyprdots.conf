# Installed to /etc/sddm.conf.d/ by phase 30. SDDM is Qt-based, so it picks up
# the qt6ct/Kvantum look; this just sets the cursor, numlock, and the default
# session. For a fully Wayland greeter (no Xorg), set DisplayServer=wayland —
# but the X11 greeter is the most reliable default on a fresh install.
[Theme]
CursorTheme=Bibata-Modern-Classic

[General]
Numlock=on

[Autologin]
Session=hyprland-de
